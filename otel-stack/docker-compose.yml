version: '3.8'

services:
  # OpenTelemetry Collector - receives and processes telemetry data
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "18417:4317"   # OTLP gRPC
      - "18418:4318"   # OTLP HTTP
      - "18889:8889"   # Prometheus metrics scrape endpoint
      - "18888:8888"   # Metrics
      - "19133:13133" # Health check
      - "19679:55679" # zPages debugging
    restart: unless-stopped
    depends_on:
      - jaeger
      - prometheus

  # Jaeger - distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.57.0
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "17686:16686" # Jaeger UI
    restart: unless-stopped

  # Prometheus - metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: otel-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    ports:
      - "19090:9090"
    restart: unless-stopped

  # Grafana - visualization dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: otel-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "13000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data: