receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 10000
  memory_limiter:
    # 75% of maximum memory up to 2G
    limit_mib: 1536
    # 25% of limit_mib
    spike_limit_mib: 512
    check_interval: 5s

  # Resource detection
  resource:
    attributes:
      - key: host.name
        from_attribute: host.name
        action: insert
      - key: service.name
        value: otel-collector
        action: upsert
      - key: deployment.environment
        value: development
        action: upsert

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

exporters:
  debug:
    verbosity: detailed

  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: otel

  otlp:
    endpoint: jaeger:4317
    tls:
      insecure: true

service:
  extensions: [health_check, zpages]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch, memory_limiter, resource]
      exporters: [debug, prometheus]
    traces:
      receivers: [otlp]
      processors: [batch, memory_limiter, resource]
      exporters: [debug, otlp]